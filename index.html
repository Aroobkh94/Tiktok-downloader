<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AROOB KH - تحميل فيديوهات تيك توك</title>
    <style>
        body {
            background-color: #000;
            color: #D4AF37;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(212, 175, 55, 0.3);
        }
        p {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #D4AF37;
            padding: 30px;
            border-radius: 15px;
            background: rgba(20, 20, 20, 0.8);
        }
        input {
            width: 90%;
            padding: 15px;
            border-radius: 25px;
            border: 1px solid #D4AF37;
            background: #111;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }
        button {
            background-color: #D4AF37;
            color: #000;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 90%;
        }
        button:hover {
            background-color: #fff;
            transform: scale(1.05);
        }
        #result {
            margin-top: 30px;
        }
        .video-preview {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .download-link {
            display: block;
            background-color: #28a745;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>AROOB KH</h1>
    <p>الأداة الأفخم لتحميل فيديوهات تيك توك بدون علامة مائية</p>

    <div class="container">
        <input type="text" id="videoUrl" placeholder="ضع رابط الفيديو هنا...">
        <button onclick="downloadVideo()">بدء التحميل</button>

        <div id="result"></div>
    </div>

    <div class="footer">
        جميع الحقوق محفوظة © 2026 Aroob KH
    </div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('videoUrl').value;
            const resultDiv = document.getElementById('result');
            
            if (!url) {
                alert("يرجى وضع رابط فيديو صحيح");
                return;
            }

            resultDiv.innerHTML = "<p style='color: #D4AF37;'>جاري المعالجة...</p>";

            try {
                // استخدام API خارجي مجاني لتحليل الروابط
                const response = await fetch(`https://api.tiklydown.eu.org/api/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (data.video) {
                    resultDiv.innerHTML = `
                        <p style="color: #fff;">تم العثور على الفيديو!</p>
                        <img src="${data.author.avatar}" style="width:50px; border-radius:50%;"><br>
                        <span style="color:#D4AF37;">${data.author.nickname}</span>
                        <a href="${data.video.noWatermark}" target="_blank" class="download-link">تحميل بدون علامة مائية (MP4)</a>
                        <a href="${data.music.play_url}" target="_blank" class="download-link" style="background:#444;">تحميل الصوت فقط (MP3)</a>
                    `;
                } else {
                    resultDiv.innerHTML = "<p style='color: red;'>عذراً، لم نتمكن من العثور على الفيديو. تأكد من الرابط.</p>";
                }
            } catch (error) {
                resultDiv.innerHTML = "<p style='color: red;'>حدث خطأ فني، يرجى المحاولة لاحقاً.</p>";
            }
        }
    </script>

    </body>
</html>
