<html lang="ar" dir="rtl">
<head>

        .container { max-width: 500px; margin: auto; border: 2px solid #D4AF37; padding: 25px; border-radius: 15px; background: #0c0c0c; }
        input { width: 90%; padding: 12px; border-radius: 10px; border: 1px solid #D4AF37; margin-bottom: 15px; background: #1a1a1a; color: #fff; }
        button { background: #D4AF37; color: #000; padding: 12px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 95%; }
        #result { margin-top: 20px; color: #fff; }
        .dl-btn { display: inline-block; background: #28a745; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
    <meta name="description" content="أسرع أداة مجانية لتحميل فيديوهات تيك توك بدون علامة مائية - Aroob KH">

</head>
<body>
    <h1>AROOB KH</h1>
    <p>تحميل فيديوهات تيك توك فائق السرعة</p>
    <div class="container">
        <input type="text" id="url" placeholder="انسخ رابط الفيديو هنا...">
        <button onclick="fetchVideo()">بدء التحميل</button>
        <div id="result"></div>
    </div>
    <p style="font-size: 0.8rem; margin-top: 30px;">© 2026 Aroob KH - جميع الحقوق محفوظة</p>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('url').value;
            const resDiv = document.getElementById('result');
            if(!url) return alert("ضع الرابط أولاً");
            
            resDiv.innerHTML = "جاري التحميل...";
            try {
                // محرك بديل
                   const response = await fetch(`https://api.vkrdownloader.com/server?v=${encodeURIComponent(url)}`);
    const data = await response.json();
 
                if(data.data.url) {
                    resDiv.innerHTML = `
                        <p>تم تجهيز الفيديو بنجاح!</p>
                        <a href="${data.data.url[0].url}" class="dl-btn" download>اضغط هنا للحفظ</a>
                    `;
                } else {
                    resDiv.innerHTML = "فشل التحميل، جربي رابطاً آخر.";
                }
            } catch(e) {
                resDiv.innerHTML = "المحرك مشغول حالياً، يرجى إعادة المحاولة بعد دقيقة.";
            }
        }
    </script>
    <script src="https://pl29313559.profitablecpmratenetwork.com/a7/64/b0/a764b0966965e9f79c84e8ba62ced07d.js"></script>
